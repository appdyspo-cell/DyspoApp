<ion-header>
  <ion-toolbar>
    <ion-buttons>
      <ion-back-button slot="start" text=""></ion-back-button>
    </ion-buttons>
    <!-- <ion-title>{{ pageTitle }}</ion-title> -->
    <ion-buttons slot="end">
      <ion-button
        fill="outline"
        shape="round"
        [disabled]=""
        (click)="saveOrUpdateEvent()"
      >
        Enregistrer
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="bg_color">
  <div class="header-form-ct">
    <div class="profile">
      <div class="item_inner">
        <div
          *ngIf="agendaEvent?.avatar"
          (click)="takePhotoPrompt()"
          style="max-width: 80%; padding: 16px; margin: auto"
        >
          <ion-img src="{{agendaEvent?.avatar}}" />
        </div>
      </div>

      <div class="input-title">
        <ion-input
          class="ion-text-center"
          maxlength="30"
          autocapitalize="words"
          [(ngModel)]="agendaEvent!.title"
          placeholder="Saisissez un Titre"
          required
        ></ion-input>
      </div>
    </div>
  </div>

  <!-- <div style="height: 50px; width: 100%"></div> -->
  <ion-card>
    <ion-item button="true" id="open-time-item" lines="none">
      <ion-text slot="start">{{agendaEvent?.start_date_formatted}}</ion-text>
      <ion-text slot="end">{{agendaEvent?.start_time_formatted}}</ion-text>
      <ion-popover
        #popover_time
        trigger="open-time-item"
        show-backdrop="false"
        size="cover"
      >
        <ng-template>
          <ion-datetime
            #datetime_starttime
            presentation="date-time"
            showDefaultButtons="true"
            doneText="OK"
            hour-cycle="h23"
            locale="fr-FR"
            [value]="agendaEvent?.startISO"
            cancelText="Annuler"
            [min]="min_time_ISO_start"
            [preferWheel]="true"
            (ionChange)="onStartTimeChanged($event)"
            ><span slot="time-label">Heure</span></ion-datetime
          >
        </ng-template>
      </ion-popover>
    </ion-item>

    <ion-item button="true" id="open-end-time-item" lines="none">
      <ion-text slot="start">{{agendaEvent?.end_date_formatted}}</ion-text>
      <ion-text slot="end">{{agendaEvent?.end_time_formatted}}</ion-text>

      <ion-popover
        #popover_time
        trigger="open-end-time-item"
        show-backdrop="false"
        size="cover"
      >
        <ng-template>
          <ion-datetime
            presentation="date-time"
            [preferWheel]="true"
            showDefaultButtons="true"
            doneText="OK"
            hour-cycle="h23"
            locale="fr-FR"
            [value]="agendaEvent?.endISO"
            [min]="min_time_ISO_end"
            cancelText="Annuler"
            (ionChange)="onEndTimeChanged($event)"
          >
            <span slot="time-label">Heure</span></ion-datetime
          >
        </ng-template>
      </ion-popover>
    </ion-item>
  </ion-card>

  <ion-card>
    <ion-radio-group [(ngModel)]="agendaEvent!.type">
      <ion-item lines="none">
        <ion-avatar slot="start">
          <ion-img src="../../../../assets/dyspo-kid.png"></ion-img>
        </ion-avatar>
        <span style="color: var(--text-dyspo-with-kids)">Kids</span>

        <ion-radio
          slot="end"
          class="ion-text-center"
          [value]="agendaEventType.KIDS"
        ></ion-radio>
      </ion-item>
      <ion-item lines="none">
        <ion-avatar slot="start">
          <ion-img src="../../../../assets/dyspo-nokid.png"></ion-img>
        </ion-avatar>
        <span style="color: var(--text-dyspo)">No Kids</span>

        <ion-radio
          slot="end"
          class="ion-text-center"
          [value]="agendaEventType.NOKIDS"
        ></ion-radio>
      </ion-item>

      <ion-item lines="none">
        <ion-avatar slot="start">
          <ion-img src="../../../../assets/dyspo-free.png"></ion-img>
        </ion-avatar>
        <span style="color: var(--text-dyspo-free)">Au choix</span>

        <ion-radio
          slot="end"
          class="ion-text-center"
          [value]="agendaEventType.FREE"
        ></ion-radio>
      </ion-item>
    </ion-radio-group>
  </ion-card>

  <ion-card>
    <ion-toolbar>
      <ion-button slot="end" fill="clear" (click)="goToFriendSelection()">
        <ion-icon name="people" slot="start"></ion-icon>Amis, Groupe</ion-button
      >
    </ion-toolbar>

    <ion-row class="friends-wrapper ion-padding">
      <div>{{getNbMembers()}}</div>
    </ion-row>
  </ion-card>

  <ion-searchbar
    [(ngModel)]="autocompletePlaceInput.input"
    (ngModelChange)="updateSearchResults()"
    placeholder="Entrez une adresse"
    (ionClear)="clearAutocomplete()"
  >
  </ion-searchbar>
  <ion-list
    class="ion-no-margin ion-no-padding"
    [hidden]="autocompletePlaces.length === 0"
  >
    <ion-item
      *ngFor="let place of autocompletePlaces"
      tappable
      (click)="selectSearchResult(place)"
    >
      {{ place.description }}
    </ion-item>
  </ion-list>
  <ion-card>
    <div class="ion-padding">
      <ion-checkbox [(ngModel)]="allCanEdit" labelPlacement="end"
        >Autoriser l'édition pour tout le monde</ion-checkbox
      >
    </div>
  </ion-card>
</ion-content>
