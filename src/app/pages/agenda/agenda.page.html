<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Calendrier</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="bg_color">
  <ion-header collapse="condense">
    <ion-toolbar style="--background: transparent">
      <ion-title size="large">Calendrier</ion-title>
      <ion-buttons slot="end">
        <ion-toggle
          labelPlacement="stacked"
          [enableOnOffLabels]="true"
          (ionChange)="onChangeMode($event)"
          >Edit</ion-toggle
        >
      </ion-buttons>
    </ion-toolbar>
  </ion-header>

  <div class="container"></div>

  <ion-calendar
    #mydiv
    [(ngModel)]="dateMulti"
    (change)="onChange($event)"
    (select)="onSelect($event)"
    (selectReadOnly)="onSelectReadOnly($event)"
    (createMonthEvent)="onCreateMonthEvent($event)"
    [type]="type"
    [options]="optionsMulti"
    [format]="'YYYY-MM-DD'"
    [readonly]="agendaMode === agendaModes.READONLY"
  ></ion-calendar>

  <ion-list-header> {{selectedDateFormatted}} </ion-list-header>

  <ion-list *ngIf="eventsForDate.length > 0">
    <ion-item
      *ngFor="let agendaEvent of eventsForDate; let i=index "
      type="button"
      mode="ios"
      (click)="updateEvent(agendaEvent)"
    >
      <ion-icon name="time-outline" slot="start"></ion-icon>
      {{agendaEvent.title}}<br />
      {{agendaEvent.start_time_formatted}} - {{agendaEvent.end_time_formatted}}
    </ion-item>
  </ion-list>
  <ion-list *ngIf="!eventsForDate || eventsForDate?.length === 0">
    <ion-item>
      <ion-icon name="time-outline" slot="start"></ion-icon>
      Pas d'evenement prévu
    </ion-item>
  </ion-list>
  <ion-fab slot="fixed" horizontal="end" vertical="bottom">
    <ion-fab-button (click)="addEvent()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
