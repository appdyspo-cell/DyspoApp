<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Calendrier</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="bg_color">
  <ion-header collapse="condense">
    <ion-toolbar style="--background: transparent">
      <ion-title size="large">Calendrier</ion-title>
      <ion-buttons slot="end">
        <ion-toggle
          labelPlacement="start"
          [enableOnOffLabels]="true"
          (ionChange)="onChangeMode($event)"
          >Edit</ion-toggle
        >
      </ion-buttons>
    </ion-toolbar>
  </ion-header>

  <div class="container">
    <ion-chip [outline]="true"
      ><div class="chip-evt bg-kid">&nbsp;</div>
      Kids</ion-chip
    >
    <ion-chip [outline]="true"
      ><div class="chip-evt bg-nokids">&nbsp;</div>
      No Kids</ion-chip
    >
    <ion-chip [outline]="true"
      ><div class="chip-evt bg-nodyspo">&nbsp;</div>
      No Dyspo</ion-chip
    >
  </div>

  <ion-calendar
    #mydiv
    [(ngModel)]="dateMulti"
    (change)="onChange($event)"
    (select)="onSelect($event)"
    (selectReadOnly)="onSelectReadOnly($event)"
    (createMonthEvent)="onCreateMonthEvent($event)"
    [type]="type"
    [options]="optionsMulti"
    [format]="'YYYY-MM-DD'"
    [readonly]="agendaMode === agendaModes.READONLY"
  ></ion-calendar>
  <div *ngIf="agendaMode === agendaModes.READONLY" style="padding-top: 5px">
    <!-- <ion-list-header> {{selectedDateFormatted}} </ion-list-header> -->

    <ion-list *ngIf="eventsForDate.length > 0">
      <ion-item
        *ngFor="let agendaEvent of eventsForDate; let i=index "
        (click)="updateEvent(agendaEvent, $event)"
        mode="ios"
      >
        <div slot="start">{{agendaEvent.startISO | dayDateFormat}}</div>
        {{agendaEvent.title}}<br />
        {{agendaEvent.start_time_formatted}} -
        {{agendaEvent.end_time_formatted}}
        <ion-buttons slot="end">
          <ion-button color="primary" (click)="goToChat(agendaEvent, $event)">
            <ion-icon name="chatbubble-ellipses-outline"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-item>
    </ion-list>
    <ion-list *ngIf="!eventsForDate || eventsForDate?.length === 0">
      <ion-item>
        <ion-icon name="time-outline" slot="start"></ion-icon>
        Pas d'evenement prévu
      </ion-item>
    </ion-list>
  </div>

  <div *ngIf="agendaMode === agendaModes.EDIT" class="ion-padding">
    Vous êtes en mode édition
    <ion-button *ngIf="agendaSvc.isModified" (click)="saveAgenda()">
      Sauvegarder mon agenda
    </ion-button>
    <ion-button
      *ngIf="agendaSvc.isModified"
      color="danger"
      (click)="cancelAgenda()"
    >
      Annuler
    </ion-button>
  </div>
  <!-- <ion-fab
    *ngIf="agendaMode === agendaModes.READONLY"
    slot="fixed"
    horizontal="end"
    vertical="bottom"
  >
    <ion-fab-button (click)="addEvent()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab> -->
</ion-content>
