<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title
      >{{'discussions' | translate}}
      <ion-icon class="ion-float-end zmdi zmdi-search ion-text-end"></ion-icon>
    </ion-title>
  </ion-toolbar>
</ion-header>
<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">{{'discussions' | translate}}</ion-title>
    </ion-toolbar>
  </ion-header>
  <ion-list lines="none" class="">
    <ion-item
      *ngFor="let agendaEvent of agendaEvents; let i=index;"
      [ngClass]="getDelayClass(i)"
      class="animate__animated animate__slideInRight"
      (click)="goToChat(agendaEvent, $event)"
    >
      <div class="item_inner d-flex">
        <div class="profile_img_box">
          <div class="profile_img">
            <img src="{{agendaEvent.avatar}}" />
          </div>
        </div>
        <div class="text-box">
          <h2 class="d-flex">
            <span>{{agendaEvent.title}}</span>
            <small>{{getLastMessageDate(agendaEvent)}}</small>
          </h2>
          <p class="d-flex">
            <ion-icon
              *ngIf="agendaEvent.last_message?.image"
              class="ion-text-start zmdi zmdi-attachment"
            ></ion-icon>
            <span class="message">{{agendaEvent.last_message?.message}}</span>

            <ng-container
              *ngIf="chatrooms[agendaEvent.uid!] && chatrooms[agendaEvent.uid!].count > 0"
            >
              <span class="end">{{chatrooms[agendaEvent.uid!].count}}</span>
            </ng-container>
          </p>
        </div>
      </div>
    </ion-item>
  </ion-list>
  <ion-fab
    class="animate__animated animate__zoomIn delay_4"
    vertical="bottom"
    horizontal="end"
    slot="fixed"
    (click)="create_group()"
  >
    <ion-fab-button>
      <ion-icon class="zmdi zmdi-accounts-add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
