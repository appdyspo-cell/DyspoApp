<ion-header class="ion-no-border wa-header">
  <!-- Default Toolbar -->
  <ion-toolbar *ngIf="!msgSelected" mode="md" color="primary">
    <ion-buttons slot="start">
      <ion-back-button color="light" text="" icon="arrow-back-outline"></ion-back-button>
      <ion-avatar class="wa-header-avatar" (click)="openEvent()">
        <img [src]="agendaEvent.avatar || 'assets/default-avatar.png'" />
      </ion-avatar>
    </ion-buttons>
    
    <ion-title (click)="openEvent()" mode="md">
      <div class="wa-header-info">
        <h2 class="wa-header-title">{{agendaEvent.title}}</h2>
        <p class="wa-header-subtitle">
          {{ display_date_1 }}
          <span *ngIf="display_date_2"> • {{ display_date_2 }}</span>
        </p>
      </div>
    </ion-title>

    <ion-buttons slot="end">
      <ion-button color="light" (click)="addToCalendar()">
        <ion-icon slot="icon-only" name="calendar-outline"></ion-icon>
      </ion-button>
      <ion-button color="light">
        <ion-icon slot="icon-only" name="videocam"></ion-icon>
      </ion-button>
      <ion-button color="light">
        <ion-icon slot="icon-only" name="call"></ion-icon>
      </ion-button>
      <ion-button color="light" (click)="openMenu($event)">
        <ion-icon slot="icon-only" name="ellipsis-vertical"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>

  <!-- Selection Toolbar -->
  <ion-toolbar *ngIf="msgSelected" mode="md" color="primary">
    <ion-buttons slot="start">
      <ion-button (click)="msgSelected = undefined" color="light">
        <ion-icon slot="icon-only" name="close-outline"></ion-icon>
      </ion-button>
      <ion-label color="light" style="margin-left: 10px; font-weight: 500;">1</ion-label>
    </ion-buttons>

    <ion-buttons slot="end">
      <ion-button (click)="deleteMsg($event)" color="light">
        <ion-icon slot="icon-only" name="trash"></ion-icon>
      </ion-button>
      <ion-button *ngIf="msgSelected.sender !== my_uid" (click)="reportMsg($event)" color="light">
        <ion-icon slot="icon-only" name="warning"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>

  <!-- Horizontal Members List -->
  <div class="wa-members-bar">
    <div class="wa-members-scroll">
      <div class="wa-member-item" *ngFor="let member of member_infos">
        <div class="wa-member-avatar-wrapper" (click)="onSelectUser(member, $event)">
          <ion-avatar class="wa-member-avatar"
            [ngClass]="{
              'status-kids': member.dyspoStatus === UserDyspoStatus.DYSPOWITHKIDS,
              'status-nokids': member.dyspoStatus === UserDyspoStatus.DYSPO,
              'status-nodyspo': member.dyspoStatus === UserDyspoStatus.NODYSPO,
              'status-undefined': member.dyspoStatus === UserDyspoStatus.UNDEFINED
            }"
          >
            <img [src]="member.avatarPath || defaultAvatar" />
          </ion-avatar>
          <ion-icon *ngIf="member.is_my_friend === false" name="add-circle" class="wa-add-icon"></ion-icon>
        </div>
        <ion-label class="wa-member-name">{{ member.firstname }}</ion-label>
      </div>
    </div>
  </div>
</ion-header>

<ion-content (ionScroll)="onScroll($event)" [scrollEvents]="true" class="wa-chat-content">
  <div class="wa-chat-container" #msgScrollableContainer>
    <!-- Loading Spinner -->
    <div *ngIf="loading" class="wa-loading">
      <ion-spinner name="crescent" color="primary"></ion-spinner>
    </div>

    <!-- Messages List -->
    <ng-container *ngFor="let msg of msgList; let i = index;">
      <div 
        class="wa-message-row" 
        [ngClass]="msg.sender === my_uid ? 'wa-sent' : 'wa-received'"
        *ngIf="!msg.is_deleted && !msg.deleted_by?.includes(my_uid)"
        (click)="handleMessageClick(msg)"
        id="{{msg.uid}}"
      >
        <div class="wa-bubble-wrapper" [ngClass]="{'wa-selected': msgSelected === msg}">
          
          <!-- Quick Reactions (WhatsApp style) -->
          <div class="wa-quick-reactions" *ngIf="msgSelected === msg">
            <span *ngFor="let rx of ['👍','❤️','😂','😮','😢','🙏']" 
                  class="wa-qr-item"
                  (click)="addReaction(msg, rx, $event)">
              {{ rx }}
            </span>
          </div>

          <!-- Triangle (Tail) -->
          <div class="wa-bubble-tail"></div>
          
          <div class="wa-bubble">
            <!-- Sender Name for Groups -->
            <h6 class="wa-sender-name" *ngIf="msg.sender !== my_uid" [style.color]="getSenderColor(msg.sender)">
              {{member_infos_obj[msg.sender]?.firstname}}
            </h6>

            <!-- Attachment Image -->
            <div class="wa-message-image" *ngIf="msg.image" (click)="openImage(msg, $event)">
              <img [src]="msg.image" />
            </div>

            <!-- Message Text and Meta -->
            <div class="wa-message-content">
              <span class="wa-text">{{msg.message}}</span>
              <div class="wa-message-meta">
                <span class="wa-time">{{msg.date_ISO | date: 'HH:mm'}}</span>
                <ion-icon 
                  *ngIf="msg.sender === my_uid" 
                  [name]="(msg.read_by?.length || 0) > 0 ? 'checkmark-done-outline' : 'checkmark-outline'" 
                  class="wa-ticks"
                  [ngClass]="{'wa-read': (msg.read_by?.length || 0) > 0}"
                ></ion-icon>
              </div>
            </div>

            <!-- Message Likes (Heart) -->
            <div class="wa-message-likes" *ngIf="(msg.likes?.length || 0) > 0">
              <div class="wa-heart-icon">❤️</div>
              <span class="wa-likes-count" *ngIf="(msg.likes?.length || 0) > 1">{{msg.likes?.length}}</span>
            </div>
          </div>
        </div>
      </div>
    </ng-container>

    <!-- Pending Attachment -->
    <div class="wa-message-row wa-sent" *ngIf="pendingAttachment">
      <div class="wa-bubble-wrapper">
        <div class="wa-bubble-tail"></div>
        <div class="wa-bubble">
          <div class="wa-message-image">
            <img [src]="pendingAttachment" />
          </div>
          <div class="wa-message-content">
            <span class="wa-text">{{getUserInputAttachment()}}</span>
            <div class="wa-message-meta">
              <span class="wa-time">Envoi...</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</ion-content>

<ion-footer class="ion-no-border wa-footer">
  <!-- Emoji Picker -->
  <div class="wa-emoji-picker" *ngIf="showEmojiPicker">
    <div class="wa-emoji-categories">
      <div 
        *ngFor="let cat of emojiCategories" 
        class="wa-emoji-cat-btn"
        [ngClass]="{'active': selectedEmojiCategory === cat.label}"
        (click)="selectedEmojiCategory = cat.label"
      >
        <ion-icon [name]="cat.icon"></ion-icon>
      </div>
    </div>
    <div class="wa-emoji-scroll-area">
      <div *ngFor="let cat of emojiCategories">
        <div *ngIf="selectedEmojiCategory === cat.label" class="wa-emoji-grid">
          <span class="wa-emoji-item" *ngFor="let emoji of cat.emojis" (click)="addEmoji(emoji)">{{emoji}}</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Options Menu (Photos/Camera) -->
  <div class="wa-options-container" [ngClass]="{'wa-options-active': viewType !== ''}">
    <div class="wa-options-inner">
      <div class="wa-option-item" (click)="openGallery()">
        <div class="wa-option-icon bg-purple"><ion-icon name="images"></ion-icon></div>
        <ion-label>Galerie</ion-label>
      </div>
      <div class="wa-option-item" (click)="takePhoto()">
        <div class="wa-option-icon bg-pink"><ion-icon name="camera"></ion-icon></div>
        <ion-label>Caméra</ion-label>
      </div>
      <div class="wa-option-item" (click)="setViewType('')">
        <div class="wa-option-icon bg-gray"><ion-icon name="close"></ion-icon></div>
        <ion-label>Fermer</ion-label>
      </div>
    </div>
  </div>

  <ion-toolbar mode="md" class="wa-input-toolbar">
    <div class="wa-input-container">
      <!-- Input Area -->
      <div class="wa-input-wrapper">
        <ion-button fill="clear" class="wa-emoji-btn" (click)="toggleEmojiPicker()">
          <ion-icon slot="icon-only" [name]="showEmojiPicker ? 'keyboard-outline' : 'happy-outline'"></ion-icon>
        </ion-button>
        
        <ion-textarea
          class="wa-textarea"
          [autoGrow]="true"
          rows="1"
          [(ngModel)]="userInput"
          (ionFocus)="onMsgInputFocused()"
          [placeholder]="getInputPlaceholder()"
        ></ion-textarea>
        
        <ion-button fill="clear" (click)="setViewType('active')" class="wa-attach-btn">
          <ion-icon slot="icon-only" name="attach-outline" [style.transform]="'rotate(45deg)'"></ion-icon>
        </ion-button>
        
        <ion-button fill="clear" class="wa-camera-btn" (click)="takePhoto()">
          <ion-icon slot="icon-only" name="camera"></ion-icon>
        </ion-button>
      </div>

      <!-- Send Button -->
      <div class="wa-send-btn-container">
        <ion-fab-button size="small" class="wa-send-btn" (click)="sendMsg()">
          <ion-icon name="send"></ion-icon>
        </ion-fab-button>
      </div>
    </div>
  </ion-toolbar>
</ion-footer>
