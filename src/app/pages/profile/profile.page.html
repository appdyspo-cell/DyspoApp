<ion-header>
  <ion-toolbar mode="md">
    <ion-buttons slot="start">
      <ion-back-button
        text=""
        color="dark"
        icon="chevron-back-outline"
      ></ion-back-button>
    </ion-buttons>
    <ion-title style="padding-left: 0px"><h1>Profil</h1></ion-title>

      <ion-button (click)="logout()" color="dark">
        <ion-icon name="log-out" slot="icon-only" color="primary"></ion-icon>
      </ion-button>
    </ion-buttons> -->
  </ion-toolbar>
  <ion-toolbar color="primary">
    <div class="userSection ion-padding-horizontal">
      <div
        slot="start"
        style="position: relative"
        tappable
        (click)="changeAvatar()"
      >
        <!-- <div
          style="
            position: absolute;
            right: -7px;
            background: var('--bg-color-secondary');
            text-align: center;
            width: 25px;
            height: 25px;
            border-radius: 12px;
          "
        >
          <ion-icon
            name="camera-outline"
            color="primary"
            style="position: relative; top: 4px"
          ></ion-icon>
        </div> -->

        <ion-avatar slot="start">
          <img [src]="user.avatarPath || defaultAvatar" />
        </ion-avatar>
      </div>

      <div class="userDetail ion-padding-start">
        <ion-label class="userName">
          {{user.firstname}} {{user.lastname}}
        </ion-label>
        <ion-text>{{user.email}}</ion-text>
      </div>
    </div>
    <p></p>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding bg_color">
  <div class="form" padding>
    <ion-list class="f-list" lines="none">
      <ion-item lines="none">
        <ion-input
          label="Nom *"
          labelPlacement="floating"
          type="name"
          minlength="3"
          maxlength="20"
          required="true"
          autocomplete="off"
          type="name"
          autocapitalize="characters"
          [(ngModel)]="user.lastname"
          name="lastname"
          placeholder="Entrez votre nom"
        ></ion-input>
      </ion-item>
      <ion-item lines="none">
        <ion-input
          label="Prénom *"
          labelPlacement="floating"
          minlength="3"
          maxlength="20"
          autocapitalize="words"
          type="text"
          [(ngModel)]="user.firstname"
          name="firstname"
          placeholder="Entrez votre prénom"
        ></ion-input>
      </ion-item>

      <ion-item lines="none">
        <ion-input
          label="Email *"
          labelPlacement="floating"
          type="text"
          minlength="3"
          maxlength="25"
          [(ngModel)]="user.email"
          name="email"
          placeholder="Entrez votre email"
        ></ion-input>
      </ion-item>

      <ion-item lines="none">
        <ion-input
          [maskito]="phoneMask"
          [maskitoElement]="maskPredicate"
          label="Téléphone *"
          labelPlacement="floating"
          type="tel"
          [(ngModel)]="user.phoneNumber"
          autocomplete="off"
          name="phoneNumber"
          required="true"
          placeholder="Entrez votre téléphone"
        ></ion-input>
      </ion-item>

      <ion-item lines="none" style="padding-bottom: 0px">
        <ion-select
          label="Zone"
          [(ngModel)]="user.geo_zone"
          (ionChange)="getAcademies()"
          placeholder="Sélectionnez une zone"
        >
          <ion-select-option value="zone_A">Zone A</ion-select-option>
          <ion-select-option value="zone_B">Zone B</ion-select-option>
          <ion-select-option value="zone_C">Zone C</ion-select-option>
        </ion-select>
      </ion-item>

      <div class="d-flex ion-align-items-center" style="margin-bottom: 30px">
        <ion-note> {{academies}} </ion-note>
      </div>

      <ion-item>
        <ion-text>J'ai des enfants </ion-text>
        <ion-buttons slot="end">
          <ion-checkbox [(ngModel)]="user.with_kids"> </ion-checkbox>
        </ion-buttons>
      </ion-item>

      <ion-item lines="none">
        <ion-label mode="md" position="stacked">Mot de passe</ion-label>

        <ion-button slot="end" (click)="resetPw()"> Changer</ion-button>
      </ion-item>

      <!-- <ion-item class="f-item" lines="none">
        <ion-label mode="md" position="floating">Téléphone</ion-label>

          mode="md"

      </ion-item>

        <ion-textarea
          [(ngModel)]="user.tagline"

            <ion-radio value="F" labelPlacement="start">Femme</ion-radio>

      </ion-list> -->
    </ion-list>
  </div>
  <div class="d-flex ion-justify-content-center">
    <ion-button
      fill="solid"
      (click)="save()"
      mode="ios"
      color="tertiary"
      class="dyspo-button"
      style="margin-left: 0px"
      >Sauvegarder
      <ion-icon name="checkmark-circle-outline" slot="start"></ion-icon>
    </ion-button>
  </div>
</ion-content>
