<ion-header>
  <ion-toolbar mode="md">
    <ion-buttons slot="start">
      <ion-back-button text="" color="dark" icon="chevron-back-outline"></ion-back-button>
    </ion-buttons>
    <ion-title><h1>Profil</h1></ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="bg_color">

  <!-- Bandeau profil centré -->
  <div class="profile-banner" tappable (click)="changeAvatar()">
    <div class="profile-avatar-wrapper">
      <ion-avatar class="profile-avatar">
        <img [src]="user.avatarPath || defaultAvatar" />
      </ion-avatar>
      <div class="camera-badge">
        <ion-icon name="camera-outline"></ion-icon>
      </div>
    </div>
    <h2 class="profile-name">{{user.firstname}} {{user.lastname | uppercase}}</h2>
    <p class="profile-email">{{user.email}}</p>
  </div>

  <!-- Formulaire -->
  <ion-card>
    <ion-list lines="none" class="ion-no-padding">

      <ion-item lines="none">
        <ion-input
          label="Nom *"
          labelPlacement="floating"
          type="name"
          minlength="3"
          maxlength="20"
          required="true"
          autocomplete="off"
          autocapitalize="characters"
          [(ngModel)]="user.lastname"
          name="lastname"
          placeholder="Entrez votre nom"
        ></ion-input>
      </ion-item>

      <ion-item lines="none">
        <ion-input
          label="Prénom *"
          labelPlacement="floating"
          minlength="3"
          maxlength="20"
          autocapitalize="words"
          type="text"
          [(ngModel)]="user.firstname"
          name="firstname"
          placeholder="Entrez votre prénom"
        ></ion-input>
      </ion-item>

      <ion-item lines="none">
        <ion-input
          label="Email *"
          labelPlacement="floating"
          type="text"
          minlength="3"
          maxlength="25"
          [(ngModel)]="user.email"
          name="email"
          placeholder="Entrez votre email"
        ></ion-input>
      </ion-item>

      <ion-item lines="none">
        <ion-input
          [maskito]="phoneMask"
          [maskitoElement]="maskPredicate"
          label="Téléphone *"
          labelPlacement="floating"
          type="tel"
          [(ngModel)]="user.phoneNumber"
          autocomplete="off"
          name="phoneNumber"
          required="true"
          placeholder="Entrez votre téléphone"
        ></ion-input>
      </ion-item>

      <ion-item lines="none">
        <ion-select
          label="Zone"
          [(ngModel)]="user.geo_zone"
          (ionChange)="getAcademies()"
          placeholder="Sélectionnez une zone"
        >
          <ion-select-option value="zone_A">Zone A</ion-select-option>
          <ion-select-option value="zone_B">Zone B</ion-select-option>
          <ion-select-option value="zone_C">Zone C</ion-select-option>
        </ion-select>
      </ion-item>

      <div class="academies-note">
        <ion-note>{{academies}}</ion-note>
      </div>

      <ion-item lines="none">
        <ion-toggle
          style="color: #46a2c2"
          [(ngModel)]="user.with_kids"
          slot="end"
        ></ion-toggle>
        <ion-label>J'ai des enfants</ion-label>
      </ion-item>

      <div *ngIf="user.with_kids" class="custody-section">
        <ion-label class="custody-label">
          Jours de garde <ion-text color="medium">(sur 2 semaines)</ion-text>
        </ion-label>
        <div class="custody-week">
          <div
            *ngFor="let day of weekDays; let i = index"
            class="day-bubble"
            [class.selected]="custodyDays[i]"
            (click)="toggleCustodyDay(i)"
          >{{ day }}</div>
        </div>
        <div class="custody-week">
          <div
            *ngFor="let day of weekDays; let i = index"
            class="day-bubble"
            [class.selected]="custodyDays[i + 7]"
            (click)="toggleCustodyDay(i + 7)"
          >{{ day }}</div>
        </div>
      </div>

      <ion-item lines="none">
        <ion-label mode="md" position="stacked">Mot de passe</ion-label>
        <ion-button slot="end" (click)="resetPw()">Changer</ion-button>
      </ion-item>

    </ion-list>
  </ion-card>

  <!-- Bouton sauvegarder -->
  <div class="d-flex ion-justify-content-center">
    <ion-button
      fill="solid"
      (click)="save()"
      mode="ios"
      color="tertiary"
      class="dyspo-button"
    >
      <ion-icon name="checkmark-circle-outline" slot="start"></ion-icon>
      Sauvegarder
    </ion-button>
  </div>

</ion-content>
