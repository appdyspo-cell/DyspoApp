<ion-content [fullscreen]="true" class="bg_color">
  <div class="header-ct">
    <div class="header">
      <h2>Aujourd'hui {{todayFormatted}}</h2>
      <div
        button
        id="open-status-modal"
        class="ion-padding dyspo-btn-container"
        style="background-color: transparent"
      >
        <!-- <div class="change-status-icon">
      <ion-icon name="create-outline" size="large"></ion-icon>
    </div> -->

        <!-- <ion-avatar slot="start">
      <ion-img [src]="avatar"></ion-img>
      </ion-avatar> -->
        <div
          class="dyspo-button dyspo ion-activatable animate__animated animate__fadeIn"
          *ngIf="todayDyspo?.userDyspo === dyspoStatus.DYSPO"
        >
          Dyspo
          <ion-ripple-effect></ion-ripple-effect>
        </div>

        <div
          *ngIf="todayDyspo?.userDyspo === dyspoStatus.DYSPOWITHKIDS"
          class="dyspo-button dyspo-with-kids ion-activatable animate__animated animate__fadeIn"
        >
          Dyspo With Kids
          <ion-ripple-effect></ion-ripple-effect>
        </div>

        <div
          *ngIf="todayDyspo?.userDyspo === dyspoStatus.NODYSPO"
          class="dyspo-button no-dyspo ion-activatable animate__animated animate__fadeIn"
        >
          No Dyspo
          <ion-ripple-effect></ion-ripple-effect>
        </div>

        <div
          *ngIf="todayDyspo.userDyspo === dyspoStatus.UNDEFINED "
          class="dyspo-button no-dyspo ion-activatable animate__animated animate__fadeIn"
        >
          Dyspo ?
          <ion-ripple-effect></ion-ripple-effect>
        </div>
      </div>
    </div>
  </div>
  <div class="shape"></div>

  <!-- <h1>Bonjour {{userSvc.userInfo?.firstname}}</h1> -->

  <div *ngIf="nextAgendaEvents.length > 0" style="padding-top: 24px">
    <ion-list-header>
      <!-- <div class="header-dot"></div> -->
      <span style="margin-right: 8px; font-size: 22px"
        ><h2>Evenements a venir</h2></span
      >
    </ion-list-header>
    <ion-card-content>
      <div class="next-agenda-container">
        <div class="next-agenda-content">
          <app-agenda-event-mini
            *ngFor="let nextEvent of nextAgendaEvents"
            class="animate__animated animate__fadeIn"
            [agendaEvent]="nextEvent"
            [isInvitation]="false"
            (click)="openAgendaEventInfo(nextEvent)"
          >
          </app-agenda-event-mini>
        </div>
      </div>
    </ion-card-content>
  </div>

  <div *ngIf="invitations.length > 0">
    <ion-list-header>
      <!-- <div class="header-dot"></div> -->
      <span style="margin-right: 8px"><h2>Invitations</h2></span>
    </ion-list-header>

    <ion-card-content>
      <div class="next-agenda-container">
        <div class="next-agenda-content">
          <app-agenda-event-mini
            *ngFor="let invit of invitations"
            [agendaEvent]="invit"
            [isInvitation]="true"
            (click)="openInvitation(invit)"
          >
          </app-agenda-event-mini>
        </div>
      </div>
    </ion-card-content>
  </div>

  <div *ngIf="friendsSuggested.length > 0">
    <ion-list-header>
      <!-- <div class="header-dot"></div> -->
      <span class="wpf-raquette" style="margin-right: 8px"
        ><h2>Demande d'Amis</h2></span
      >
    </ion-list-header>

    <ion-card-content>
      Vous avez
      <span style="font-size: 1.3rem; font-weight: bold"
        >{{friendsSuggested.length}}</span
      >
      demandes d'ami en attente
    </ion-card-content>
  </div>
  <!-- 
  <div *ngIf="notifications.length > 0">
    <ion-list-header>
      <span
        class="wpf-raquette"
        style="margin-right: 8px; font-size: 22px"
      ></span>
      Notifications
    </ion-list-header>

    <ion-card-content>
      <div class="next-agenda-container">
        <div class="next-agenda-content">
          <div *ngFor="let notif of notifications" class="next-agenda-element">
            <span style="font-weight: bold">{{notif.title}}</span
            ><br />{{notif.message}}
          </div>
        </div>
      </div>
    </ion-card-content>
  </div> -->

  <ion-modal
    #statusmodal
    trigger="open-status-modal"
    (willDismiss)="onWillDismiss($event)"
    [initialBreakpoint]="0.4"
    [breakpoints]="[0, 0.4]"
  >
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-title>Changer mon Status</ion-title>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding ion-margin">
        <div class="dyspo-modal-btns-container">
          <div
            button
            class="dyspo-button dyspo ion-activatable margin-bottom"
            (click)="updateStatus(dyspoStatus.DYSPO)"
          >
            Dyspo
            <ion-ripple-effect></ion-ripple-effect>
          </div>
          <div
            button
            class="dyspo-button dyspo-with-kids ion-activatable margin-bottom"
            (click)="updateStatus(dyspoStatus.DYSPOWITHKIDS)"
          >
            Dyspo With Kids
            <ion-ripple-effect></ion-ripple-effect>
          </div>
          <div
            button
            class="dyspo-button no-dyspo ion-activatable"
            (click)="updateStatus(dyspoStatus.NODYSPO)"
          >
            No Dyspo
            <ion-ripple-effect></ion-ripple-effect>
          </div>
        </div>
      </ion-content>
    </ng-template>
  </ion-modal>
</ion-content>
