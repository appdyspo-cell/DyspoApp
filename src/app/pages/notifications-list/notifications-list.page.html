<ion-header>
  <ion-toolbar mode="md">
    <ion-buttons slot="start">
      <ion-back-button
        text=""
        color="dark"
        icon="chevron-back-outline"
      ></ion-back-button>
    </ion-buttons>
    <ion-title style="padding-left: 0px"><h1>Notifications</h1></ion-title>
  </ion-toolbar>
</ion-header>

<ion-content
  class="bg_color"
  style="padding: var(--ion-safe-area-top) 0px var(--ion-safe-area-bottom) 0px"
>
  <div *ngIf="invitations.length === 0" class="ion-padding ion-text-center">
    <strong>
      <ion-text style="color: rgb(100, 100, 100)"
        >Pas de notifications</ion-text
      >
    </strong>
  </div>
  <div class="event-wrapper" *ngFor="let nextEvent of invitations">
    <app-agenda-event-mini
      class="animate__animated animate__fadeIn"
      [agendaEvent]="nextEvent"
      [isInvitation]="true"
      (click)="openAgendaEventInfo(nextEvent)"
    >
    </app-agenda-event-mini>
  </div>
</ion-content>
