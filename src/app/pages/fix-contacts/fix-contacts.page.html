<ion-header>
  <ion-toolbar mode="md">
    <ion-buttons slot="start">
      <ion-back-button
        text=""
        color="dark"
        icon="chevron-back-outline"
      ></ion-back-button>
    </ion-buttons>
    <ion-title style="padding-left: 0px"><h1>Contacts</h1></ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="shareApp()">
        <ion-icon
          slot="icon-only"
          name="share-social-outline"
          color="dark"
        ></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div
    id="container-suggestions"
    class="ion-justify-content-center"
    style="display: flex; width: 100%; align-items: center; padding: 16px"
    *ngIf="appContacts.length === 0"
  >
    <ion-icon
      name="person-outline"
      class="empty-icon-circle icon-large empty-icon-color"
    ></ion-icon>
    <br />
    <strong class="capitalize">
      <ion-text style="color: rgb(100, 100, 100)"
        >Vous n'avez pas de contacts</ion-text
      >
    </strong>
  </div>
  <ion-searchbar
    mode="ios"
    [(ngModel)]="inputSearch"
    (ngModelChange)="updateSearchResults()"
    placeholder="Rechercher un contact"
    (ionClear)="clearAutocomplete()"
    showCancelButton="never"
  ></ion-searchbar>
  <ion-list [hidden]="autocompleteItems.length === 0" class="ion-no-padding">
    <ion-item
      *ngFor="let contact of autocompleteItems; let i=index"
      lines="full"
    >
      <div slot="start" class="avatar-container">
        <ion-thumbnail class="thumb" *ngIf="contact.avatar">
          <img src="{{contact.avatar}}" />
        </ion-thumbnail>
        <div
          *ngIf="!contact.avatar"
          [style.background-color]="colors[i % colors.length]"
          class="avatar"
        >
          {{contact.initials}}
        </div>
      </div>
      <div>
        <div class="d-flex">
          <ion-text>{{ contact.display }} </ion-text>
        </div>
      </div>

      <ion-buttons slot="end" style="padding-right: 15px">
        <ion-button
          (click)="confirmFriendInvitation(contact)"
          size="large"
          *ngIf="contact.is_member===true && !contact.is_my_friend"
        >
          <ion-icon
            name="add-circle-outline"
            slot="icon-only"
            color="primary"
          ></ion-icon>
        </ion-button>

        <ion-thumbnail *ngIf="contact.is_member===true">
          <img src="assets/logo.svg" />
        </ion-thumbnail>
      </ion-buttons>
    </ion-item>
  </ion-list>
  <ng-container #mainContainer> </ng-container>
</ion-content>
<app-alphabet-scroll
  (letterSelected)="scrollToLetter($event)"
  (scrollingLetter)="letterScrollActive($event)"
></app-alphabet-scroll>

<ng-template #itemGroup let-appContactGrouped>
  <ion-item-group>
    <ion-item-divider sticky="true">
      <ion-label>{{ appContactGrouped.letter }}</ion-label>
    </ion-item-divider>

    <ion-item
      *ngFor="let contact of appContactGrouped.contacts; let j=index"
      (click)="confirmFriendInvitation(contact)"
    >
      <div slot="start" class="avatar-container">
        <ion-thumbnail class="thumb" *ngIf="contact.avatar">
          <img src="{{contact.avatar}}" />
        </ion-thumbnail>
        <div
          *ngIf="!contact.avatar"
          [style.background-color]="colors[j % colors.length]"
          class="avatar"
        >
          {{contact.initials}}
        </div>
      </div>
      <div>
        <div class="d-flex">
          <ion-text> {{ contact.display }} </ion-text>
          <!-- <ion-thumbnail *ngIf="contact.is_member===true">
            <img src="assets/logo.svg" />
          </ion-thumbnail> -->
        </div>

        <!-- <ion-note *ngIf="contact.is_my_friend"> Vous êtes ami </ion-note> -->
      </div>

      <ion-buttons slot="end" style="padding-right: 15px">
        <ion-button
          size="large"
          *ngIf="contact.is_member===true && !contact.is_my_friend"
        >
          <ion-icon
            name="add-circle-outline"
            slot="icon-only"
            color="primary"
          ></ion-icon>
        </ion-button>

        <ion-thumbnail *ngIf="contact.is_member===true">
          <img src="assets/logo.svg" />
        </ion-thumbnail>
      </ion-buttons>
    </ion-item>
  </ion-item-group>
</ng-template>
