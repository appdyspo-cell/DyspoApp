<ion-content fullscreen="true" class="ion-no-padding">
  <div class="main">
    <div class="bg"></div>

    <ion-card class="ion-no-margin">
      <ion-card-content>
        <ion-row class="row">
          <div class="dyspo-logo ion-text-center">
            <img #title class="img-logo" src="../../../assets/logo_login.png" />
          </div>
        </ion-row>
        <ion-row class="ion-margin-top">
          <ion-col>
            <ion-item class="roundedInput8px margin-bottom-10" lines="none">
              <div
                slot="start"
                style="
                  border-right: 1px solid;
                  border-color: rgb(155, 155, 155);
                  margin-right: 8px;
                  width: 35px;
                "
              >
                <ion-icon
                  color="medium"
                  name="mail-outline"
                  style="font-size: 22px; padding-top: 10px"
                ></ion-icon>
              </div>
              <ion-input
                type="email"
                placeholder="Email"
                [(ngModel)]="userInfo.email"
                clear-input="true"
              ></ion-input>
            </ion-item>
          </ion-col>
        </ion-row>
        <ion-row>
          <ion-col>
            <ion-item class="roundedInput8px margin-bottom-10" lines="none">
              <div
                slot="start"
                style="
                  border-right: 1px solid;
                  border-color: rgb(155, 155, 155);
                  margin-right: 8px;
                  width: 35px;
                "
              >
                <ion-icon
                  color="medium"
                  name="lock-closed-outline"
                  style="font-size: 22px; padding-top: 10px"
                ></ion-icon>
              </div>
              <ion-input
                type="password"
                placeholder="Mot de passe"
                [(ngModel)]="userInfo.password"
                class="ion-padding-start"
                clear-input="true"
              ></ion-input>
            </ion-item>
          </ion-col>
        </ion-row>
        <ion-row>
          <ion-col>
            <ion-text
              class="ion-float-end text-light"
              color="medium"
              (click)="forgotPassword()"
            >
              <h6 class="small ion-no-margin ion-text-end">
                {{ 'FORGOTPASSWORD' | translate }}
              </h6>
            </ion-text>
          </ion-col>
        </ion-row>
        <ion-row>
          <ion-col>
            <div
              style="width: 100%; display: flex"
              class="ion-justify-content-center"
            >
              <ion-button
                #btn1
                [disabled]="disablePage"
                mode="ios"
                (click)="submitLoginForm()"
                color="tertiary"
                class="dyspo-button"
                >{{ 'LOGIN' | translate }}<ion-icon
                  name="log-in-outline"
                  slot="start"
                ></ion-icon
              ></ion-button>
            </div>
          </ion-col>
        </ion-row>

        <p>&nbsp;</p>
        <ion-row>
          <ion-col>
            <div class="ion-text-center text-light" style="font-size: 1.1rem">
              Pas encore de compte ?
            </div>
          </ion-col>
        </ion-row>

        <ion-row>
          <ion-col>
            <div
              style="width: 100%; display: flex"
              class="ion-justify-content-center"
            >
              <ion-button
                (click)="signup()"
                color="tertiary"
                class="dyspo-button"
                mode="ios"
                >{{ 'REGISTER' | translate }}<ion-icon
                  name="person-outline"
                  slot="start"
                ></ion-icon
              ></ion-button>
            </div>
          </ion-col>
        </ion-row>
        <div class="line"></div>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
