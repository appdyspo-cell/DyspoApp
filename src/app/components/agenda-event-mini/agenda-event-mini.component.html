<div class="agenda-event-container">
  <ion-row style="border-bottom: 1px solid">
    <ion-col size="3">
      <ion-avatar class="event-type-avatar">
        <ion-img
          *ngIf="agendaEvent.type === agendaEventType.KIDS"
          src="../../../../assets/dyspo-kid.png"
        ></ion-img>
        <ion-img
          *ngIf="agendaEvent.type === agendaEventType.NOKIDS"
          src="../../../../assets/dyspo-nokid.png"
        ></ion-img>
        <ion-img
          *ngIf="agendaEvent.type === agendaEventType.FREE"
          src="../../../../assets/dyspo-free.png"
        ></ion-img>
      </ion-avatar>
    </ion-col>
    <ion-col class="ion-align-items-center ion-text-center title-notif">{{
      agendaEvent.title
    }}</ion-col></ion-row
  >
  <ion-row>
    <ion-col size="3" *ngIf="agendaEvent.avatar">
      <ion-thumbnail style="border-radius: 5px; overflow: hidden">
        <img src="{{ agendaEvent.avatar }}" />
      </ion-thumbnail>
    </ion-col>
    <ion-col class="ion-align-items-center ion-text-center">
      {{ agendaEvent.start_date_formatted }}<br />
      <ion-text style="font-size: 0.85rem"
        >{{ agendaEvent.start_time_formatted }} -
        {{ agendaEvent.end_time_formatted }}</ion-text
      >
    </ion-col></ion-row
  >
</div>
