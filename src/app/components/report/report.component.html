<ion-content>
  <div class="content">
    <ion-card
      *ngFor="let report of reportData"
      style="padding-bottom: 0px !important"
    >
      <div class="avatarAbs">
        <ion-avatar
          [ngStyle]="{
            background: 'url(' + report.image + ')',
            'background-size': 'cover'
          }"
        ></ion-avatar>
      </div>
      <ion-item>
        <ion-label>
          <h2 class="ion-text-center">{{ report.head }}</h2>
          <p class="ion-text-wrap ion-text-center">{{ report.desc }}</p>
        </ion-label>
      </ion-item>
      <ion-list>
        <ion-item class="desc-inner" lines="none">
          <ion-textarea
            counter="true"
            label="Description"
            labelPlacement="floating"
            [(ngModel)]="report_text"
            rows="5"
            maxlength="300"
            placeholder="Décrivez le motif de votre signalement..."
          ></ion-textarea>
        </ion-item>
        <ion-button expand="full" fill="clear" (click)="sendWarningReport()">
          Envoyer
        </ion-button>
        <ion-button expand="full" fill="clear" (click)="modalCtrl.dismiss()">
          Annuler
        </ion-button>
      </ion-list>
    </ion-card>
  </div>
</ion-content>
